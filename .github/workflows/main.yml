name: iOS Bulut Derleme Testi (0 Maliyet)

on:
  push:
    branches: ["ios-deneme-branch"] # Sen main dâlına kod pushladığında otomatik çalışır

jobs:
  build-ios:
    runs-on: macos-latest # GitHub bizim için arkada ücretsiz bir Mac açıyor

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Java Altyapısını Kur (Android bileşenleri için)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Xcode Sürümünü Ayarla
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Gradle Yetkisini Ayarla
        run: chmod +x gradlew

      - name: iOS Framework Derlemesini Başlat
        run: ./gradlew :shared:linkReleaseFrameworkIosX64
        # Not: Bu komut ortak katmandaki kodlarını Apple makine koduna çevirir.