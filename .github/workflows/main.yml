name: iOS Bulut Derleme Testi

on:
  push:
    branches: [ "ios-deneme-branch" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Java Altyapısını Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Xcode Sürümünü Ayarla
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Gradle Yetkisini Ayarla
        run: chmod +x gradlew

      # 1. Aşama: Derlemeyi dene
      - name: iOS Framework Derlemesini Başlat
        run: ./gradlew :shared:assembleDebugFrameworkIosArm64 || ./gradlew :shared:assembleDebugFrameworkIosX64

      # 2. Aşama: Eğer üstteki komut başarısız olursa, görev isimlerini listele (Debug için)
      - name: Görev İsimlerini Listele (Hata Alırsan Buraya Bak)
        if: failure()
        run: ./gradlew :shared:tasks --group=build