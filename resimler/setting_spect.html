<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ayarlar - Wildwood Adventure</title>
<!-- Material Symbols Link -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "game-green": "#4CAF50",
                        "game-red": "#FF5252",
                        "background-light": "#f8f7f5",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "huge": "3rem",
                        "xl": "2rem",
                    },
                },
            },
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 1, "wght" 700, "GRAD" 0, "opsz" 48
    }
/* Forest background simulation */
.forest-bg {
    background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuB9bBCsic0DVzlTTdkKJSeIfjCQGE47Cx_6cCQWLS5-IkvsH1YlZrroZ9R0AGK_zPfp2EF7bwnrJRf0SzxCQYPVpSb7HtUBDAx3Nj3zlshgj8xY3x1g_oQ5MKt-ay3N_63oCMhoBgzdDo1A8mCuYqkHz9YsZ4aUmASaqPj_GL4sVFXQ62dR5oL1vw_30LbNe6Eq4z76nFVw9BIVET58Akl24x_bvMZvYSKEaHmaXTpoX1ei-P0i1gZrk5Nr_Cc3hkP11tLtOhEOOd0);
    background-size: cover;
    background-position: center;
    filter: blur(4px);
    transform: scale(1.1)
    }
.no-scrollbar::-webkit-scrollbar {
    display: none
    }
.no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none
    }
/* Custom Switch Styling */
.game-switch:checked + .switch-dot {
    transform: translatex(1.5rem);
    background-color: white
    }
.game-switch:checked {
    background-color: #f48c25
    }</style>
</head>
<body class="bg-slate-900 font-display text-[#1c140d] antialiased h-screen overflow-hidden flex items-center justify-center p-4">
<!-- Blurred Forest Background Wrapper -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="forest-bg w-full h-full"></div>
</div>
<!-- Modal Container -->
<div class="relative z-10 w-full max-w-md bg-white border-[8px] border-game-green rounded-huge shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Close Button (X) -->
<button class="absolute top-4 right-4 z-20 size-12 bg-game-red text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform border-4 border-white/20">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<!-- Content Area -->
<div class="p-8 pt-10 flex flex-col items-center">
<!-- Title -->
<h1 class="text-game-green text-4xl font-[800] italic tracking-wider mb-8 drop-shadow-sm">AYARLAR</h1>
<div class="w-full space-y-6">
<!-- Music Control -->
<div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl border-2 border-gray-100">
<div class="flex items-center gap-4">
<div class="size-14 bg-primary/20 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">music_note</span>
</div>
<span class="text-xl font-bold text-gray-700">Müzik</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only game-switch peer" type="checkbox"/>
<div class="w-16 h-9 bg-gray-300 rounded-full peer-checked:bg-primary transition-colors border-2 border-black/5"></div>
<div class="absolute left-1.5 top-1.5 size-6 bg-white rounded-full transition-transform peer-checked:translate-x-7 shadow-md"></div>
</label>
</div>
<!-- SFX Control -->
<div class="flex items-center justify-between bg-gray-50 p-5 rounded-3xl border-2 border-gray-100">
<div class="flex items-center gap-4">
<div class="size-14 bg-primary/20 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">volume_up</span>
</div>
<span class="text-xl font-bold text-gray-700">Ses Efektleri</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only game-switch peer" type="checkbox"/>
<div class="w-16 h-9 bg-gray-300 rounded-full peer-checked:bg-primary transition-colors border-2 border-black/5"></div>
<div class="absolute left-1.5 top-1.5 size-6 bg-white rounded-full transition-transform peer-checked:translate-x-7 shadow-md"></div>
</label>
</div>
<!-- Parental Lock Button -->
<button class="w-full mt-4 bg-gray-800 hover:bg-black text-white p-6 rounded-3xl flex items-center justify-between group active:scale-[0.98] transition-all shadow-xl">
<div class="flex items-center gap-4">
<div class="size-12 bg-white/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">lock</span>
</div>
<div class="text-left">
<p class="text-lg font-bold">Ebeveyn Kilidi</p>
<p class="text-xs text-gray-400">Ayarları yönet</p>
</div>
</div>
<span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
<!-- Footer Mascot (Subtle Wildwood vibe) -->
<div class="mt-8 opacity-20 grayscale pointer-events-none">
<img alt="Mascot" class="h-16" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuhREv9lgZK82D20byMPUScQx2ip2QsDI6Vrr5F81iBBHVidoEET7WulQAJGkFqpJ7uOlQxaEDsiyonSFzAFToTI1FzisiGrLex9EUtD-_lLAMuhjDZysPvPIPpHT-zpfeqzSCE7wbZHgvqvsYB-TGfoyQB-s-_6R-XusRhDnGlnLCCxJcfZWRQMOQi6sGcDjdUC9WIeZWhuH4DUGroehVKli8Db0cQvpUfhipn27lhJ6w16qyCBKYPh-j1R_1Rf9zz-la8kyUpIU"/>
</div>
</div>
</div>
</body></html>
