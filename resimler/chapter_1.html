<script id="tailwind-config">

            darkMode: "class",

                extend: {
                    colors: {
                        "primary": "#f48c25",

            animation: float 3s ease-in-out infinite;
        }

            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;

</div>
