<!DOCTYPE html>

<!-- Fonts -->

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-dark": "#0a0a0f",
                        "ui-brown": "#3d2b1f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'game': '0 8px 0 rgba(0,0,0,0.3)',
                        'glow-teal': '0 0 20px rgba(45, 212, 191, 0.6)',

<style>

            user-select: none;
            -webkit-user-select: none;

        }
        .text-outline {
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }
        .bg-night-beach {
            background: linear-gradient(to bottom, #050510 0%, #0a0a20 40%, #152035 100%);
        }
        .glow-shell {
            filter: drop-shadow(0 0 8px rgba(254, 240, 138, 0.8));
        }

</head>

</div>

<div class="absolute bottom-0 w-full h-24 bg-[#1a1510] border-t-4 border-[#2d241c]">

<div class="absolute bottom-24 left-1/3 w-64 h-12 bg-[#2d1b2e] rounded-xl border-t-4 border-[#3d263f] shadow-lg flex items-center justify-center">

</div>

<div class="w-full h-full relative">
<span class="material-icons-round text-[#100c08] text-9xl absolute bottom-0 left-8 transform scale-y-150">park</span>
<span class="material-symbols-outlined text-[#0a1f0a] text-8xl absolute top-4 left-0 rotate-45" style="font-variation-settings: 'FILL' 1">eco</span>
<span class="material-symbols-outlined text-[#0a1f0a] text-8xl absolute top-0 left-8 -rotate-12" style="font-variation-settings: 'FILL' 1">eco</span>
</div>
</div>
</div>
<!-- 4. Game Entities -->
<div class="absolute inset-0 z-10 pointer-events-none">

</div>
</div>
<!-- Enemy: Crab (Dark red glow) -->
<div class="absolute bottom-24 left-[60%] w-12 h-10">
<div class="w-full h-full bg-red-900 rounded-full border-2 border-red-950 shadow-[0_0_15px_rgba(220,38,38,0.4)] flex items-center justify-center relative">
<span class="material-icons-round text-red-500 text-3xl opacity-80">bug_report</span>
<div class="absolute -top-1 flex space-x-2">
<div class="w-1 h-1 bg-red-500 rounded-full animate-pulse"></div>
<div class="w-1 h-1 bg-red-500 rounded-full animate-pulse"></div>
</div>

</div>

</div>
</div>
<!-- Glowing Pearl (High Jump) -->
<div class="absolute bottom-[220px] left-[50%] w-10 h-10">

<div class="w-8 h-8 rounded-full bg-yellow-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-yellow-400 text-xl" style="font-variation-settings: 'FILL' 1">spa</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] text-yellow-200/60 font-bold uppercase tracking-widest leading-none">KABUK</span>
<span class="text-lg font-black text-white leading-tight">8<span class="text-white/40 font-normal">/20</span></span>
</div>
</div>
<!-- Score Counter -->
<div class="bg-ui-brown/80 backdrop-blur-md rounded-full border border-yellow-900/50 px-4 py-2 flex items-center space-x-3 shadow-lg">
<div class="w-8 h-8 rounded-full bg-yellow-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-yellow-500 text-xl" style="font-variation-settings: 'FILL' 1">stars</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] text-yellow-200/60 font-bold uppercase tracking-widest leading-none">PUAN</span>
<span class="text-lg font-black text-white leading-tight">1250</span>
</div>
</div>
</div>
<!-- Center: Level Name -->
<div class="mt-2">
<h2 class="text-white text-xs md:text-sm font-bold tracking-[0.2em] uppercase opacity-80 text-center">Bölüm 2: Kumsal Macerası</h2>
</div>
<!-- Right: Lives & Pause -->
<div class="flex flex-col items-end space-y-4">
<button class="pointer-events-auto w-10 h-10 bg-black/60 rounded-full border border-white/10 flex items-center justify-center backdrop-blur-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined text-white">pause</span>
</button>
<!-- Hearts -->
<div class="bg-black/40 backdrop-blur-md rounded-full px-3 py-2 border border-white/5 flex items-center space-x-1 shadow-inner">
<span class="material-symbols-outlined text-red-500 text-2xl" style="font-variation-settings: 'FILL' 1">favorite</span>
<span class="material-symbols-outlined text-red-500 text-2xl" style="font-variation-settings: 'FILL' 1">favorite</span>
<span class="material-symbols-outlined text-red-500 text-2xl" style="font-variation-settings: 'FILL' 1">favorite</span>
</div>
</div>
</div>

<div class="absolute bottom-4 right-4 md:bottom-8 md:right-8">

<div class="absolute inset-0 rounded-full shadow-glow-orange animate-pulse opacity-50"></div>

<span class="text-white font-black text-xs uppercase tracking-[0.15em] text-outline">Zıpla</span>
</button>
</div>
<!-- Left Side Back Button -->
<div class="absolute bottom-4 left-4 md:bottom-8 md:left-8">
<button class="pointer-events-auto w-12 h-12 bg-black/40 rounded-full border border-white/10 flex items-center justify-center backdrop-blur-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
</div>
</div>
<!-- Atmospheric Vignette -->
<div class="absolute inset-0 pointer-events-none shadow-[inset_0_0_120px_rgba(0,0,0,0.6)] z-40"></div>
