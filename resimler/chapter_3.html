<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Oyun Ekranı - Bölüm 3: Bulutlar Arası Macera</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-dark": "#0a0a0c",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 5s ease-in-out infinite;
            animation-delay: 1s;
        }
        .glow-cloud {
            box-shadow: 0 0 20px rgba(147, 197, 253, 0.2);
        }
        .glow-feather {
            filter: drop-shadow(0 0 8px rgba(244, 140, 37, 0.6));
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-dark h-screen w-full overflow-hidden flex flex-col font-display select-none">
<!-- Game Viewport -->
<main class="relative flex-1 w-full h-full overflow-hidden group/design-root">
<!-- Dark Night Sky Background Layer -->
<div class="absolute inset-0 z-0 bg-gradient-to-b from-[#050507] via-[#0f111a] to-[#1a1b26]" data-alt="Dark midnight sky gradient">
<!-- Distant Glowing Stars -->
<div class="absolute top-10 right-20 opacity-40">
<span class="material-symbols-outlined text-white text-4xl animate-pulse">star</span>
</div>
<div class="absolute top-48 left-1/4 opacity-20">
<span class="material-symbols-outlined text-white text-lg animate-pulse">star</span>
</div>
<div class="absolute top-24 left-10 opacity-30">
<span class="material-symbols-outlined text-white text-2xl animate-pulse">star</span>
</div>
<!-- Atmospheric Nebula/Glow -->
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-blue-900/20 to-transparent"></div>
</div>
<!-- Moving Atmospheric Clouds -->
<div class="absolute top-1/4 left-10 opacity-20 animate-float-delayed">
<div class="w-32 h-16 bg-blue-300/20 rounded-full blur-xl"></div>
</div>
<div class="absolute top-1/3 right-1/4 opacity-10 animate-float">
<div class="w-48 h-20 bg-indigo-400/20 rounded-full blur-xl"></div>
</div>
<!-- Game World Layer -->
<div class="absolute inset-0 z-10 flex items-center justify-center">
<!-- Platform 1: Glowing Cloud -->
<div class="absolute bottom-1/3 left-[-50px] w-[300px] h-[100px]">
<div class="w-full h-full bg-slate-800/80 backdrop-blur-sm rounded-full border-t border-white/10 glow-cloud shadow-inner relative flex items-center justify-center" data-alt="Dark glowing cloud platform">
<!-- Collectible: Star Dust -->
<div class="absolute -top-10 right-10 flex flex-col items-center animate-bounce">
<span class="material-symbols-outlined text-yellow-400 text-3xl drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]">temp_preferences_custom</span>
</div>
</div>
</div>
<!-- Platform 2: Center Jump Cloud -->
<div class="absolute bottom-1/2 left-1/3 w-[200px] h-[80px] animate-float">
<div class="w-full h-full bg-slate-800/80 backdrop-blur-sm rounded-full border-t border-white/10 glow-cloud relative" data-alt="Floating dark cloud platform">
<!-- Collectible: Feather (Glowing) -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2">
<span class="material-symbols-outlined text-primary text-4xl glow-feather rotate-12">mode_fan</span>
</div>
</div>
</div>
<!-- Obstacle: Storm Cloud (Darker with more glow) -->
<div class="absolute top-1/4 right-1/4 w-[180px] h-[90px] animate-pulse">
<div class="w-full h-full bg-purple-950/40 backdrop-blur-sm rounded-full shadow-2xl relative border border-purple-500/30 flex items-center justify-center" data-alt="Dark storm cloud obstacle">
<span class="material-symbols-outlined text-yellow-300 text-4xl animate-ping absolute drop-shadow-[0_0_15px_rgba(253,224,71,1)]">bolt</span>
<span class="material-symbols-outlined text-yellow-300 text-4xl absolute">bolt</span>
</div>
</div>
<!-- Platform 3: Destination Cloud -->
<div class="absolute bottom-1/3 right-[-60px] w-[320px] h-[110px]">
<div class="w-full h-full bg-slate-800/80 backdrop-blur-sm rounded-full border-t border-white/10 glow-cloud relative" data-alt="Large dark cloud platform"></div>
</div>
<!-- Character: Fox (Updated to match IMAGE_5) -->
<div class="absolute bottom-[44%] left-[32%] z-20">
<div class="relative w-28 h-28 overflow-hidden flex items-center justify-center" data-alt="Fox character">
<img alt="Fox" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujiNE861SPRsARarD3rLD65EOpPqZvJaaOo4i6OimPog22p2IFvpoAX6y53ltes1zYDGyPbtIMRF_3p6eVSv85mQnlO-ZtfRNYg4lw-DV9P3HOAPtwVBO-MgNSsmeiU6Cmw_4jtlfTqArTvvHGVoKpdlqT5sxLqHG43ZAhACcWK7zsKN-D4S1pQLFRWGhhsaDP7HPTxF7O0LsAKphvK-vK03ciunW9ax8OUB_WyUve_4-a223g_7I6v5ZCf0f-g6AN1JyXroFjrxg"/>
</div>
<!-- Glow effect under character -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-16 h-4 bg-orange-500/20 blur-md rounded-full"></div>
</div>
<!-- Flying Bird Obstacle -->
<div class="absolute top-1/3 left-10 z-10 opacity-60">
<span class="material-symbols-outlined text-blue-200 text-5xl -scale-x-100 drop-shadow-[0_0_8px_rgba(191,219,254,0.5)]">flutter_dash</span>
</div>
</div>
<!-- UI Overlay Layer (Atmospheric Dark UI) -->
<div class="absolute top-0 left-0 w-full z-50 p-6 flex flex-col items-center">
<!-- Level Info -->
<div class="mb-4">
<span class="text-white font-bold tracking-tight text-shadow-lg text-lg">Bölüm 3: Bulutlar Arası Macera</span>
</div>
<div class="w-full flex justify-between items-start max-w-xl mx-auto">
<!-- Left: Back and Stats -->
<div class="flex flex-col gap-3">
<button class="size-12 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white active:scale-95 transition-transform shadow-xl">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Feather Stats -->
<div class="bg-[#2a1d12]/90 border border-[#4a3422] rounded-full py-1.5 px-3 flex items-center gap-3 shadow-xl">
<div class="size-8 rounded-full bg-cyan-900/50 flex items-center justify-center">
<span class="material-symbols-outlined text-cyan-400 text-xl">mode_fan</span>
</div>
<div class="flex flex-col leading-none">
<span class="text-[10px] text-white/50 font-bold uppercase tracking-wider">TÜY</span>
<span class="text-white font-bold text-lg">12<span class="text-white/40 font-normal text-sm">/25</span></span>
</div>
</div>
<!-- Point Stats -->
<div class="bg-[#2a1d12]/90 border border-[#4a3422] rounded-full py-1.5 px-3 flex items-center gap-3 shadow-xl">
<div class="size-8 rounded-full bg-yellow-900/50 flex items-center justify-center">
<span class="material-symbols-outlined text-yellow-500 text-xl">stars</span>
</div>
<div class="flex flex-col leading-none">
<span class="text-[10px] text-white/50 font-bold uppercase tracking-wider">PUAN</span>
<span class="text-white font-bold text-lg">450</span>
</div>
</div>
</div>
<!-- Right: Pause and Hearts -->
<div class="flex flex-col items-end gap-3">
<button class="size-12 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white active:scale-95 transition-transform shadow-xl">
<span class="material-symbols-outlined">pause</span>
</button>
<!-- Hearts Display -->
<div class="flex gap-1.5 bg-black/20 backdrop-blur-sm p-2 rounded-full">
<span class="material-symbols-outlined text-red-500 fill-current text-2xl drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]">favorite</span>
<span class="material-symbols-outlined text-red-500 fill-current text-2xl drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]">favorite</span>
<span class="material-symbols-outlined text-red-500 fill-current text-2xl drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]">favorite</span>
</div>
</div>
</div>
</div>
<!-- Controls Layer -->
<div class="absolute bottom-0 w-full p-8 z-50 flex items-end justify-end pointer-events-none">
<!-- Orange Bubble Jump Button (Level 4 Style) -->
<div class="pointer-events-auto">
<button class="group relative flex size-24 cursor-pointer flex-col items-center justify-center rounded-full bg-[#f48c25] shadow-[0_10px_0_rgb(180,83,9),0_20px_40px_rgba(244,140,37,0.3)] active:shadow-none active:translate-y-[10px] transition-all duration-150 border-4 border-white/20">
<span class="material-symbols-outlined text-[#1c140d] text-5xl font-bold">arrow_upward</span>
<span class="text-[#1c140d] text-xs font-black uppercase tracking-tighter">ZIPLA</span>
</button>
</div>
</div>
</main>
</body></html>
