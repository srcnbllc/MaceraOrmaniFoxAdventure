<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hızlı Tilki - Karakter Profili</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "card-dark": "#32261a",
                        "card-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-white overflow-hidden selection:bg-primary selection:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl overflow-y-auto">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="flex size-10 items-center justify-center rounded-full bg-transparent hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] text-center">Karakter Profili</h2>
<div class="size-10"></div> <!-- Spacer for alignment -->
</div>
<!-- Main Content Scroll Area -->
<div class="flex-1 flex flex-col px-5 pb-6 pt-2">
<!-- Hero Image Section -->
<div class="relative w-full aspect-[4/5] rounded-[2rem] overflow-hidden shadow-2xl mb-6 group">
<!-- Decorative background glow -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent"></div>
<!-- Character Image -->
<div class="absolute inset-0 w-full h-full bg-center bg-cover transition-transform duration-700 group-hover:scale-105" data-alt="Illustration of a cute orange fox character running cheerfully in a stylized forest environment" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBgfO-rlU3LA2pCFWP2nSwY2Cg7oY-jTf_aEsTNU0Xl2VzuOuB9RO9pyYVWN3BjdI6ghRnuwyXBQaFV5m4ukmvYwgIxwO9ajkxcRCkg6YDW1PToD9Rh17Oa8Ok57xZN0wT6UzAVk6qmAbCtpi-qRzcP7_FO8PMvNAz3GvagsFUzrlcBI8nqb_y6JtX9YIyP8oXQHj5DSSR18Zl2ssb1C3ZegVUYPiCPAcVRwjH49SXvB5VvrQO-XArQTcYjpP-66PyH0DE8xlKvBTY");'>
</div>
<!-- Inner Shadow Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 via-transparent to-transparent opacity-80"></div>
<!-- Floated Name on Image (Optional Visual Style) -->
<div class="absolute bottom-6 left-0 right-0 px-6 text-center">
<h1 class="text-white tracking-tight text-4xl font-extrabold drop-shadow-lg">Hızlı Tilki</h1>
<div class="mt-2 inline-flex items-center gap-1 px-3 py-1 rounded-full bg-white/20 backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-yellow-400 text-sm fill-1">star</span>
<span class="text-xs font-bold text-white uppercase tracking-wider">Favori</span>
</div>
</div>
</div>
<!-- Stats Section -->
<div class="grid grid-cols-2 gap-3 mb-6">
<!-- Speed Stat -->
<div class="flex flex-col gap-2 rounded-2xl p-4 bg-card-light dark:bg-card-dark shadow-sm border border-gray-100 dark:border-white/5">
<div class="flex items-center gap-2 mb-1">
<div class="p-2 rounded-full bg-orange-100 dark:bg-orange-500/20 text-orange-600 dark:text-orange-400">
<span class="material-symbols-outlined text-xl">bolt</span>
</div>
<p class="text-sm font-bold text-gray-500 dark:text-gray-400">Hız</p>
</div>
<div class="flex items-end gap-1">
<p class="text-2xl font-bold leading-none text-gray-900 dark:text-white">10</p>
<span class="text-sm font-medium text-gray-400 mb-1">/10</span>
</div>
<!-- Progress Bar -->
<div class="h-2 w-full bg-gray-100 dark:bg-white/10 rounded-full overflow-hidden mt-1">
<div class="h-full bg-primary w-full rounded-full"></div>
</div>
</div>
<!-- Jump Stat -->
<div class="flex flex-col gap-2 rounded-2xl p-4 bg-card-light dark:bg-card-dark shadow-sm border border-gray-100 dark:border-white/5">
<div class="flex items-center gap-2 mb-1">
<div class="p-2 rounded-full bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400">
<span class="material-symbols-outlined text-xl">upgrade</span>
</div>
<p class="text-sm font-bold text-gray-500 dark:text-gray-400">Zıplama</p>
</div>
<div class="flex items-end gap-1">
<p class="text-2xl font-bold leading-none text-gray-900 dark:text-white">9</p>
<span class="text-sm font-medium text-gray-400 mb-1">/10</span>
</div>
<!-- Progress Bar -->
<div class="h-2 w-full bg-gray-100 dark:bg-white/10 rounded-full overflow-hidden mt-1">
<div class="h-full bg-blue-500 w-[90%] rounded-full"></div>
</div>
</div>
</div>
<!-- Description Text -->
<div class="mb-8">
<p class="text-gray-600 dark:text-gray-300 text-base font-normal leading-relaxed text-center px-2">
                    Çok hızlı koşar ve en yüksek engellerden bile atlayabilir! Ormanın en neşeli ve en çevik dostudur.
                </p>
</div>
</div>
<!-- Sticky Bottom Actions -->
<div class="p-5 pt-2 pb-8 bg-background-light dark:bg-background-dark flex flex-col gap-3 sticky bottom-0 z-30">
<!-- Shadow gradient for smooth scrolling visual -->
<div class="absolute -top-12 left-0 right-0 h-12 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent pointer-events-none"></div>
<button class="w-full bg-primary hover:bg-orange-600 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-orange-500/30 flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all">
<span>Bu Karakteri Seç</span>
<span class="material-symbols-outlined filled">check_circle</span>
</button>
<button class="w-full bg-transparent border-2 border-gray-200 dark:border-white/10 hover:bg-gray-50 dark:hover:bg-white/5 text-gray-700 dark:text-gray-300 font-bold text-base py-3 rounded-2xl flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all">
<span>Geri Dön</span>
</button>
</div>
</div>
</body></html>
