<style>
      body {

<body class="bg-surface font-body">
<!-- TopAppBar - Shell only, transparent for background immersion -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center px-8 h-20 bg-emerald-950/40 backdrop-blur-xl rounded-b-[3rem] mt-2 mx-4 shadow-[0_20px_50px_rgba(3,16,19,0.5)]">
<div class="flex items-center gap-3">

<span class="text-2xl font-bold bg-gradient-to-r from-emerald-300 to-green-400 bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">Wildwood Adventure</span>
</div>
</header>
<!-- Main Immersive Environment Canvas -->
<main class="relative w-screen h-screen overflow-hidden bg-surface-container-lowest">
<!-- Layer 4: Deep Sky / Cavern Roof (Deep Background) -->
<div class="parallax-layer z-0 opacity-40 bg-gradient-to-b from-surface-container-lowest via-surface-container-low to-surface-dim" data-alt="Dark deep emerald forest sky with distant silhouettes of towering ancient trees under a faint glowing aurora"></div>
<!-- Mid-ground Fog & Atmospheric Lighting -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-surface via-transparent to-transparent opacity-60"></div>
<!-- Layer 3: Far Mid-ground Trees (Silhouettes) -->
<div class="parallax-layer z-20 translate-y-12 scale-110 blur-[2px]" data-alt="Deep misty forest layers with silhouettes of conifers in dark emerald and charcoal tones, atmospheric depth" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBFO3zCyCNY5S4-yZ36xEIupV2okmCnPbBQBCH3lCmSOEUQvL1W_n8YGRcXg_Nhhp74TvFcdeGLHsKPmMlGWG7OKeuU9e4J5U7kPS4q0hFeCxg8_5lkzpJhMmFFwHrdQbDeCL3Jv3H3SFgYkjvVbpBkU9ZR-tPixq9Cuk18H21Rwa9RO_yyMfrwfJXdzqJ7CN7_ROVHyUyHXhAxu1FVS8yQZCHp4aI6eL9uTj2N5svHA6_nFzdoN2IlIHdJiRow2EfxQa3kvH_Gsz4'); background-blend-mode: multiply; filter: contrast(1.2) brightness(0.4) saturate(0.5);"></div>
<!-- Layer 2: Main Environmental Focus (Crystal Cave Glow) -->
<div class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none">
<!-- Glowing Flora & Focal Points -->
<div class="w-full h-full flex flex-wrap justify-around items-end pb-32 opacity-80">
<div class="w-64 h-96 rounded-full bg-gradient-to-t from-primary/20 to-transparent blur-3xl absolute bottom-0 left-1/4"></div>
<div class="w-96 h-96 rounded-full bg-gradient-to-t from-secondary/15 to-transparent blur-3xl absolute bottom-1/4 right-1/4"></div>
</div>
<!-- High Fidelity Vector-Style Tree Elements -->
<div class="absolute inset-x-0 bottom-0 h-3/4 bg-[url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&amp;fit=crop&amp;q=80&amp;w=2000')] bg-no-repeat bg-bottom bg-cover mix-blend-screen opacity-30" data-alt="Sunlight filtering through a dense canopy of lush green deciduous forest, high resolution vector style lighting effects"></div>
</div>
<!-- Layer 1: Foreground Assets (Highest Contrast & Sharpness) -->
<div class="parallax-layer z-40 flex items-end justify-between px-[-10%] pointer-events-none">
<!-- Large Foreground Foliage (Left) -->
<div class="w-1/3 h-full bg-[url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&amp;fit=crop&amp;q=80&amp;w=1000')] bg-no-repeat bg-left-bottom bg-contain translate-x-[-10%] translate-y-[10%] opacity-90 scale-125 origin-bottom-left blur-[1px]" data-alt="Close up of vibrant green tropical fern leaves in the foreground with sharp detail and soft ambient shadow" style="filter: drop-shadow(20px -20px 40px rgba(0,0,0,0.8)) hue-rotate(20deg);"></div>
<!-- Large Foreground Foliage (Right) -->
<div class="w-1/3 h-full bg-[url('https://images.unsplash.com/photo-1545143333-6382f1d5b893?auto=format&amp;fit=crop&amp;q=80&amp;w=1000')] bg-no-repeat bg-right-bottom bg-contain translate-x-[10%] translate-y-[15%] opacity-90 scale-110 origin-bottom-right" data-alt="Giant lush forest leaves in the foreground with warm orange sunlight rim lighting and deep emerald textures" style="filter: drop-shadow(-20px -20px 40px rgba(0,0,0,0.8)) contrast(1.1);"></div>
</div>
<!-- Dynamic Light Particles / Glowing Embers -->
<div class="absolute inset-0 z-50 pointer-events-none">
<!-- Static placement for "living" particles in HTML design -->
<div class="floating-particle top-[20%] left-[15%] animate-pulse"></div>
<div class="floating-particle top-[45%] left-[60%] animate-pulse" style="background-color: #ffb778; box-shadow: 0 0 10px #ffb778; animation-delay: 1s;"></div>
<div class="floating-particle top-[70%] left-[30%] animate-pulse" style="animation-delay: 2s;"></div>
<div class="floating-particle top-[10%] left-[80%] animate-pulse" style="background-color: #f8acff; box-shadow: 0 0 10px #f8acff; animation-delay: 0.5s;"></div>
<div class="floating-particle top-[85%] left-[75%] animate-pulse" style="animation-delay: 1.5s;"></div>
<div class="floating-particle top-[40%] left-[10%] animate-pulse" style="background-color: #3fff8b; box-shadow: 0 0 15px #3fff8b; width: 6px; height: 6px;"></div>
</div>
<!-- Layer 0: Blur Foreground Overlay (Lens Depth) -->
<div class="absolute inset-0 z-[60] pointer-events-none">
<div class="absolute bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-surface-container-lowest to-transparent opacity-80"></div>

<div class="absolute -top-20 -right-20 w-96 h-96 bg-orange-900/20 rounded-full blur-[100px]"></div>
</div>

<div>

</div>
</div>
</div>

</div>
<div class="bg-emerald-950/30 backdrop-blur-lg px-4 py-2 rounded-full border border-white/5 flex items-center gap-2">
