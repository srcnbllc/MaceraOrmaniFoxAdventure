<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ödül Ekranı</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes shine {
            from { transform: translateX(-100%) rotate(45deg); }
            to { transform: translateX(200%) rotate(45deg); }
        }
        .shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes pulse-star {
            0%, 100% { transform: scale(1) rotate(-12deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(-12deg); opacity: 0.8; }
        }
        .animate-pulse-star {
            animation: pulse-star 2s ease-in-out infinite;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-white antialiased selection:bg-primary selection:text-white">
<div class="relative flex h-screen w-full flex-col mx-auto overflow-hidden max-w-md shadow-2xl">
<!-- Abstract Background Shapes & Confetti -->
<div class="absolute top-[-5%] right-[-10%] w-40 h-40 rounded-full bg-primary/20 blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[20%] left-[-10%] w-32 h-32 rounded-full bg-yellow-500/10 blur-3xl pointer-events-none"></div>
<!-- Static Confetti Elements -->
<div class="absolute top-10 left-[15%] w-2 h-4 bg-red-400 rotate-12 rounded-sm opacity-60"></div>
<div class="absolute top-24 right-[10%] w-3 h-3 bg-blue-400 -rotate-45 rounded-full opacity-60"></div>
<div class="absolute top-40 left-[8%] w-4 h-2 bg-yellow-400 rotate-45 rounded-sm opacity-60"></div>
<div class="absolute top-60 right-[5%] w-2 h-2 bg-primary rotate-12 rounded-full opacity-50"></div>
<div class="absolute bottom-1/3 left-[20%] w-3 h-3 bg-green-400 rotate-12 rounded-sm opacity-40"></div>
<div class="absolute bottom-1/4 right-[15%] w-2 h-4 bg-purple-400 -rotate-12 rounded-sm opacity-40"></div>
<!-- Header Section -->
<div class="pt-10 pb-4 text-center z-10 px-4">
<h1 class="text-4xl font-black tracking-tighter text-primary drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] leading-tight uppercase">BÖLÜM TAMAMLANDI!</h1>
</div>
<!-- Star Rating (2 filled, 1 empty/dimmed) -->
<div class="flex justify-center items-end gap-3 z-10 h-24 mb-6">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[52px] text-[#FFD700] drop-shadow-[0_0_15px_rgba(255,215,0,0.6)] transform -rotate-12" style="font-variation-settings: 'FILL' 1, 'wght' 700;">star</span>
</div>
<div class="flex flex-col items-center pb-4">
<span class="material-symbols-outlined text-[72px] text-[#FFD700] drop-shadow-[0_0_20px_rgba(255,215,0,0.8)] z-20 animate-pulse-star" style="font-variation-settings: 'FILL' 1, 'wght' 700;">star</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[52px] text-gray-600/50 drop-shadow-sm transform rotate-12" style="font-variation-settings: 'FILL' 0, 'wght' 400;">star</span>
</div>
</div>
<!-- Hero / Character Area -->
<div class="flex-1 flex flex-col items-center justify-center relative z-10 w-full px-6 min-h-[160px]">
<div class="absolute w-56 h-56 bg-primary/20 rounded-full blur-3xl top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>
<div class="w-full aspect-square max-h-56 rounded-xl bg-contain bg-center bg-no-repeat animate-float z-10" data-alt="Cute animated fox character jumping in the air with joy celebrating victory" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDq0Mux1PdDPWc8BK33FPOtikZJGfEp6MFRAYVKT_rhN7lF7VpAxgrX_HXyeywFx52l1j-S9ZM9quQCjh2X4MzjBPwpHejUyT54BeawGb_zqvNInxq07nxdgJlR_yDQpC36PH_CQw8ORAzpps-rxArkq6MgEkH5NxP_HCvON00xLCSObx6HFIMu0MhG0WEWWZ-IzhCwPDNKNvTA4xCgoKtJLMPDrJZSKlKTQ8_tqKU7hfZoHp7XEPUUcg9Sxw8E7oRKmS_g9X1E6tM");'>
</div>
</div>
<!-- Score Card Container -->
<div class="flex flex-col w-full px-8 gap-4 z-10 mb-8">
<div class="bg-[#342618]/90 backdrop-blur-md border-2 border-[#4a3b2a] rounded-2xl p-5 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden">
<div class="flex flex-col gap-1 w-full border-b border-white/10 pb-3 mb-3">
<p class="text-[#cbad90] text-sm font-bold tracking-widest uppercase">Bölüm Puanı</p>
<p class="text-white text-4xl font-black tracking-tight leading-none drop-shadow-md">1.250</p>
</div>
<div class="flex items-center gap-2">
<span class="text-green-400 font-bold text-lg">Bonus:</span>
<span class="text-white text-2xl font-black">+250</span>
</div>
<!-- Decorative corner elements -->
<div class="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-primary/40"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-primary/40"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="pb-12 px-8 flex flex-col items-center gap-4 z-20">
<!-- Continue Button (Primary) -->
<button class="w-full h-16 bg-gradient-to-b from-[#f69d44] to-[#f48c25] rounded-2xl border-t-4 border-white/30 shadow-[0_6px_0_#c2660f] flex items-center justify-center gap-3 transition-all active:translate-y-1 active:shadow-none relative overflow-hidden group">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="text-white text-xl font-black uppercase tracking-wider drop-shadow-md">DEVAM ET</span>
<span class="material-symbols-outlined text-white text-3xl font-bold" style="font-variation-settings: 'wght' 700;">arrow_forward</span>
</button>
<!-- Replay Button (Secondary) -->
<button class="flex items-center gap-2 px-6 py-2 rounded-full bg-[#342618] border border-[#4a3b2a] transition-all active:scale-95 group">
<span class="material-symbols-outlined text-[#cbad90] text-xl group-hover:text-white transition-colors">refresh</span>
<span class="text-sm font-bold text-[#cbad90] group-hover:text-white uppercase tracking-wider">TEKRAR OYNA</span>
</button>
</div>
</div>
</body></html>
