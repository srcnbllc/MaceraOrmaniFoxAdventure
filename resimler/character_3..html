<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Çevik Sincap - Karakter Tanıtımı</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "primary-dark": "#d97210",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "card-dark": "#2d2318",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "2xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'glow': '0 0 40px -10px rgba(244, 140, 37, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 1,
            'wght' 600,
            'GRAD' 0,
            'opsz' 24
        }
        
        /* Subtle float animation for the squirrel */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        /* Leaf falling background pattern */
        .bg-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(244, 140, 37, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display h-screen flex flex-col overflow-hidden select-none">
<!-- Top Navigation -->
<div class="flex items-center justify-between p-6 z-10">
<button class="flex items-center justify-center size-12 rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors backdrop-blur-sm">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold tracking-wide uppercase opacity-80">Karakter Seçimi</h2>
<div class="size-12"></div> <!-- Spacer for balance -->
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-start relative px-6 overflow-y-auto">
<!-- Background Glow Effect -->
<div class="absolute top-10 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/20 blur-[80px] rounded-full pointer-events-none"></div>
<!-- Character Hero Section -->
<div class="relative w-full max-w-sm aspect-square mb-2 float-anim z-10">
<!-- Decorative circle behind character -->
<div class="absolute inset-4 rounded-full border-4 border-dashed border-primary/30 animate-[spin_20s_linear_infinite]"></div>
<!-- Character Image -->
<div class="w-full h-full bg-center bg-contain bg-no-repeat drop-shadow-2xl scale-110" data-alt="Cute animated 3D squirrel character with big eyes standing on a branch looking heroic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuClRK-YZHySuB4H5Gaz9VU4K2fJI-jJ8YjgnNT4ATWj02O7S11hLLyMbPfudWQFMoQLgzvI3JB3C5lR-xrrIVL9RKii_GIAO_xKgYHf22CuoEs-PQtiJ2KPGAVuFSAknRzV4lh7YuKV98M78ubuZn33eCsGXHtCqD0HbGSWFIhO1W6YQLBLNPHHsvaEkGdc1wsu4YzS2O6ZtyDNTlMg4jV73dBm9v1vcyfDhmTu3N7gAaII7vSqEvolRvq5ED2jgRKdDDz1yfG8hb0'); mask-image: radial-gradient(circle, black 60%, transparent 100%); -webkit-mask-image: radial-gradient(circle, black 60%, transparent 100%);">
</div>
<!-- Floating Level Badge -->
<div class="absolute bottom-4 right-8 bg-card-dark border-2 border-primary/50 text-primary px-4 py-1.5 rounded-full flex items-center gap-1 shadow-lg transform rotate-[-5deg]">
<span class="material-symbols-outlined text-sm">stars</span>
<span class="text-sm font-bold">Seviye 1</span>
</div>
</div>
<!-- Character Title -->
<div class="text-center z-10 mb-6">
<h1 class="text-white text-4xl font-extrabold tracking-tight mb-2 drop-shadow-lg">Çevik Sincap</h1>
<div class="flex items-center justify-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="text-gray-400 text-sm font-medium tracking-widest uppercase">Orman Kaşifi</span>
<span class="w-2 h-2 rounded-full bg-primary"></span>
</div>
</div>
<!-- Stats Chips -->
<div class="flex gap-3 mb-6 w-full justify-center">
<div class="flex h-10 items-center gap-x-2 rounded-full bg-card-dark border border-white/5 pl-3 pr-4 shadow-md">
<div class="text-primary" style="font-size: 20px;">
<span class="material-symbols-outlined">bolt</span>
</div>
<div class="flex flex-col leading-none">
<span class="text-[10px] text-gray-400 font-bold uppercase">Hız</span>
<span class="text-white text-sm font-bold">Yüksek</span>
</div>
</div>
<div class="flex h-10 items-center gap-x-2 rounded-full bg-card-dark border border-white/5 pl-3 pr-4 shadow-md">
<div class="text-primary" style="font-size: 20px;">
<span class="material-symbols-outlined">psychology</span>
</div>
<div class="flex flex-col leading-none">
<span class="text-[10px] text-gray-400 font-bold uppercase">Zeka</span>
<span class="text-white text-sm font-bold">Dahi</span>
</div>
</div>
</div>
<!-- Description Card -->
<div class="w-full max-w-sm bg-card-dark/80 backdrop-blur-md rounded-2xl p-5 border border-white/5 mb-24">
<div class="flex items-start gap-4">
<div class="shrink-0 size-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">info</span>
</div>
<div>
<h3 class="text-white font-bold text-lg mb-1">Yetenekler</h3>
<p class="text-gray-300 text-sm leading-relaxed">
                        Ağaçlara tırmanabilir ve küçük boşluklardan kolayca geçebilir! Gizli yolları bulmakta ustadır.
                    </p>
</div>
</div>
<!-- Simple Stat Bars using Acorns (Circles) -->
<div class="mt-4 pt-4 border-t border-white/5 flex flex-col gap-3">
<div class="flex items-center justify-between">
<span class="text-xs text-gray-400 font-bold uppercase tracking-wider w-20">Tırmanma</span>
<div class="flex gap-1 flex-1 justify-end">
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-white/20"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-xs text-gray-400 font-bold uppercase tracking-wider w-20">Zıplama</span>
<div class="flex gap-1 flex-1 justify-end">
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
<div class="size-2.5 rounded-full bg-primary"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full p-6 pt-0 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-20">
<button class="w-full h-16 bg-primary hover:bg-primary-dark active:scale-[0.98] transition-all rounded-xl shadow-glow flex items-center justify-center gap-3 group relative overflow-hidden">
<!-- Button Shine Effect -->
<div class="absolute top-0 -left-full w-1/2 h-full bg-white/20 skew-x-[-20deg] group-hover:animate-[shimmer_1s_infinite]"></div>
<span class="text-white font-bold text-lg uppercase tracking-wide z-10">Bu Karakteri Seç</span>
<span class="material-symbols-outlined text-white z-10 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Ambient background pattern overlay -->
<div class="fixed inset-0 bg-pattern opacity-5 pointer-events-none z-0"></div>
<style>
        @keyframes shimmer {
            100% {
                left: 150%;
            }
        }
    </style>
</body></html>
